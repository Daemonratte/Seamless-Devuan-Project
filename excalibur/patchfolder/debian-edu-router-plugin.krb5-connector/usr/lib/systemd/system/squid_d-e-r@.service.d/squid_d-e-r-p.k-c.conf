# This file is supposed to be loaded by systemd in addition to squid_d-e-r@.service.
# NOTE: If the directory (/usr/lib/systemd/system/squid_d-e-r@.service.d/) exists and is
# empty, the service will be disabled! If you don't intend to put something in the
# directory, ensure that it does not exist.

[Service]
# Used by Debian Edu Router Plugin: Krb5 Connector
Environment="KRB5_KTNAME=/etc/debian-edu-router/krb5.d/krb5.keytab.squid"
Environment="KRB5_CONFIG=/etc/debian-edu-router/krb5.d/krb5.conf.squid"
#Environment="KRB5RCACHETYPE=none"
ExecStartPre="[[ -e /etc/debian-edu-router/debug ]] && KRB5_TRACE=/dev/stderr" # Enable debug tracing, if debug mode file is present.
